<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HebraTech — Módulo Operarios</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  
  <style>
    /* ============= ESTILOS GENERALES ============= */
    * {
      box-sizing: border-box;
    }

    body {
      background: #1E2224;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(165, 201, 202, 0.3);
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(165, 201, 202, 0.5);
    }

    /* ============= NAVBAR ============= */
    .navbar {
      background: #2C4A52 !important;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    /* ============= COLUMNAS KANBAN ============= */
    .kanban-column {
      min-height: 65vh;
      background: #222D30;
      border: 1px solid rgba(165, 201, 202, 0.2);
      border-radius: 12px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      transition: all 0.3s ease;
    }

    .kanban-column.drag-over {
      background: rgba(165, 201, 202, 0.08);
      border-color: #A5C9CA;
      box-shadow: inset 0 0 10px rgba(165, 201, 202, 0.1);
    }

    .kanban-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.5rem;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
    }

    .kanban-status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
    }

    .status-pendiente .kanban-status-dot {
      background: #395B64;
    }

    .status-proceso .kanban-status-dot {
      background: #A5C9CA;
    }

    .status-finalizado .kanban-status-dot {
      background: #2C4A52;
    }

    .kanban-count {
      margin-left: auto;
      background: rgba(165, 201, 202, 0.15);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      color: #A5C9CA;
    }

    /* ============= TARJETAS KANBAN ============= */
    .task-card {
      background: #2C3E42;
      border: 2px solid transparent;
      border-radius: 10px;
      padding: 0.75rem; /* Altura reducida */
      cursor: grab;
      transition: all 0.2s ease;
      margin-bottom: 0.5rem; /* Margen reducido */
      position: relative;
      /* Se eliminó overflow: hidden para evitar que la tarjeta se vea cortada al hacer drag */
    }

    .task-card:hover {
      /* Se eliminó transform: translateY para evitar el bug visual (fantasma cortado) en el drag de HTML5 */
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
      border-color: rgba(165, 201, 202, 0.3);
    }

    .task-card.dragging {
      opacity: 0.9;
      cursor: grabbing;
      border: 2px dashed #A5C9CA !important; /* Nuevo borde al mover */
      background: #223135 !important;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
    }

    .task-card.drag-over-item {
      border-color: #A5C9CA;
      background: rgba(165, 201, 202, 0.05);
    }

    /* Borde izquierdo por estado */
    .task-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      border-top-left-radius: 10px; /* Redondeo directo sin depender de overflow */
      border-bottom-left-radius: 10px;
      transition: width 0.2s ease;
    }

    .status-pendiente .task-card::before {
      background: #395B64;
    }

    .status-proceso .task-card::before {
      background: #A5C9CA;
    }

    .status-finalizado .task-card::before {
      background: #2C4A52;
    }

    .task-card:hover::before {
      width: 6px;
    }

    .task-title {
      font-weight: 600;
      color: #E2E8F0;
      font-size: 0.95rem;
      margin-bottom: 0.25rem; /* Altura reducida */
      word-break: break-word;
    }

    .task-desc {
      color: #CBD5E1;
      font-size: 0.85rem;
      line-height: 1.4;
      margin-bottom: 0.5rem; /* Altura reducida */
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .task-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
      color: #A5C9CA;
      margin-top: 0.5rem; /* Altura reducida */
      padding-top: 0.5rem; /* Altura reducida */
      border-top: 1px solid rgba(165, 201, 202, 0.1);
    }

    .task-id {
      font-weight: 700;
      background: rgba(165, 201, 202, 0.1);
      padding: 2px 8px;
      border-radius: 4px;
    }

    .task-priority {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 600;
      margin-top: 0.25rem;
    }

    .priority-alta {
      background: rgba(239, 68, 68, 0.2);
      color: #FCA5A5;
    }

    .priority-media {
      background: rgba(251, 146, 60, 0.2);
      color: #FDBA74;
    }

    .priority-baja {
      background: rgba(34, 197, 94, 0.2);
      color: #86EFAC;
    }

    /* ============= PLACEHOLDER DRAG ============= */
    .drop-placeholder {
      background: linear-gradient(135deg, rgba(165, 201, 202, 0.1), rgba(165, 201, 202, 0.05));
      border: 2px dashed #A5C9CA;
      border-radius: 8px;
      margin-bottom: 0.5rem;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    /* ============= CONTAINERS ============= */
    .drop-zone {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0;
      transition: all 0.2s ease;
    }

    /* ============= MODAL ============= */
    .modal-content {
      background: #223135;
      border: 1px solid rgba(165, 201, 202, 0.2);
      border-radius: 12px;
    }

    .modal-header {
      border-bottom: 1px solid rgba(165, 201, 202, 0.1);
      padding: 1.5rem;
    }

    .modal-title {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      color: #A5C9CA;
    }

    .form-control, .form-select {
      background: #1E2224 !important;
      border: 1px solid rgba(165, 201, 202, 0.2) !important;
      color: #E2E8F0 !important;
      transition: all 0.2s ease;
    }

    .form-control:focus, .form-select:focus {
      background: #2C3E42 !important;
      border-color: #A5C9CA !important;
      box-shadow: 0 0 0 0.25rem rgba(165, 201, 202, 0.1) !important;
    }

    .form-label {
      color: #A5C9CA;
      font-size: 0.85rem;
      font-weight: 500;
    }

    /* ============= BADGES Y CONTADORES ============= */
    .stat-badge {
      background: rgba(57, 91, 100, 0.2) !important;
      border: 1px solid rgba(165, 201, 202, 0.2);
      color: #A5C9CA;
      padding: 0.5rem 0.75rem;
      border-radius: 20px;
      font-size: 0.85rem;
    }

    /* ============= FILTROS ============= */
    .filter-section {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .input-group-text {
      background: #223135 !important;
      border-color: rgba(165, 201, 202, 0.2) !important;
      color: #A5C9CA;
    }

    .form-control {
      color: #E2E8F0;
    }

    /* ============= BOTONES ============= */
    .btn-primary-custom {
      background: #395B64;
      border: none;
      color: #E2E8F0;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .btn-primary-custom:hover {
      background: #4A7A87;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(57, 91, 100, 0.3);
    }

    .btn-outline-danger {
      border-color: rgba(239, 68, 68, 0.5);
      color: #FCA5A5;
    }

    .btn-outline-danger:hover {
      background: rgba(239, 68, 68, 0.1);
      border-color: #FCA5A5;
    }

    /* ============= ANIMACIONES ============= */
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .task-card {
      animation: slideIn 0.3s ease;
    }

    /* ============= RESPONSIVE ============= */
    @media (max-width: 992px) {
      .kanban-column {
        min-height: auto;
        max-height: 600px;
      }
      .drop-zone {
        min-height: 400px;
      }
    }

    /* ============= ESTADOS VACÍOS ============= */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      color: #A5C9CA;
      opacity: 0.5;
      min-height: 300px;
    }

    .empty-state i {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.3;
    }

    .tag-badge {
      display: inline-block;
      background: rgba(165, 201, 202, 0.15);
      color: #A5C9CA;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.7rem;
      margin-top: 0.25rem;
    }
  </style>
</head>

  <script>
    // ============= DATOS ============= 
    let tasks = [
      { id: 831, title: "Mantenimiento Telar A", desc: "Se realizó ajuste de tensión y lubricación de engranajes.", status: "finalizado", prio: "media", tag: "Mantenimiento", date: "Hoy, 09:15 AM", assignee: "Santiago Cano" },
      { id: 794, title: "Falla Eléctrica Sensor", desc: "Sensor óptico intermitente detiene la marcha.", status: "proceso", prio: "alta", tag: "Eléctrico", date: "Ayer, 03:40 PM", assignee: "Santiago Cano" },
      { id: 720, title: "Repuesto Agotado", desc: "Sin stock de materia prima en bodega central.", status: "pendiente", prio: "baja", tag: "Materia Prima", date: "28 May, 10:22 AM", assignee: "Otro Operario" }
    ];

    const taskModal = new bootstrap.Modal(document.getElementById('taskModal'));
    let draggedCard = null;
    let draggedTaskId = null;
    let draggedHeight = 0; // Guardar altura exacta para el placeholder

    // ============= CREAR TARJETA ============= 
    function createCard(task) {
      const card = document.createElement('div');
      card.className = 'task-card';
      card.draggable = true;
      card.dataset.id = task.id;

      const priorityText = { alta: '🔴 Alta', media: '⚪ Media', baja: '🟢 Baja' };

      card.innerHTML = `
        <div class="task-title">${escapeHtml(task.title)}</div>
        <div class="task-desc">${escapeHtml(task.desc)}</div>
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <span class="task-priority priority-${task.prio}">${priorityText[task.prio]}</span>
            ${task.tag ? `<div class="tag-badge">${escapeHtml(task.tag)}</div>` : ''}
          </div>
        </div>
        <div class="task-footer">
          <span><i class="bi bi-calendar3 me-1"></i>${escapeHtml(task.date)}</span>
          <span class="task-id">#${task.id}</span>
        </div>
      `;

      // ============= EVENTOS DRAG ============= 
      card.addEventListener('dragstart', (e) => {
        draggedCard = card;
        draggedTaskId = task.id;
        draggedHeight = card.offsetHeight; // Ajuste para que no salte el layout
        
        // Timeout para que el navegador capture el clon original sin estilos de .dragging
        setTimeout(() => card.classList.add('dragging'), 0);
        
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/html', card.innerHTML);
      });

      card.addEventListener('dragend', () => {
        draggedCard = null;
        draggedTaskId = null;
        card.classList.remove('dragging');
        document.querySelectorAll('.drop-placeholder').forEach(p => p.remove());
        document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('drag-over'));
      });

      card.addEventListener('click', (e) => {
        if (e.target !== card) return;
        openEditModal(task.id);
      });

      return card;
    }

    // ============= CONFIGURAR DROP ZONES ============= 
    function setupDropZones() {
      document.querySelectorAll('.drop-zone').forEach(zone => {
        zone.addEventListener('dragover', (e) => {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          zone.classList.add('drag-over');

          const existing = zone.querySelector('.drop-placeholder');
          if (!existing) {
            const placeholder = document.createElement('div');
            placeholder.className = 'drop-placeholder';
            placeholder.style.height = `${draggedHeight}px`; // Placeholder igual de alto a la tarjeta
            zone.appendChild(placeholder);
          }
        });

        zone.addEventListener('dragleave', (e) => {
          if (!zone.contains(e.relatedTarget)) {
            zone.classList.remove('drag-over');
            zone.querySelector('.drop-placeholder')?.remove();
          }
        });

        zone.addEventListener('drop', (e) => {
          e.preventDefault();
          zone.classList.remove('drag-over');
          zone.querySelector('.drop-placeholder')?.remove();

          if (!draggedTaskId) return;

          const newStatus = zone.dataset.status;
          const task = tasks.find(t => t.id == draggedTaskId);
          
          if (task && task.status !== newStatus) {
            task.status = newStatus;
            renderAll();
          }
          
          draggedTaskId = null;
          draggedCard = null;
        });
      });
    }

    // ============= RENDERIZAR TODO ============= 
    function renderAll() {
      const lists = {
        pendiente: document.getElementById('list-pendiente'),
        proceso: document.getElementById('list-proceso'),
        finalizado: document.getElementById('list-finalizado')
      };

      const historyContainer = document.getElementById('historyItemsContainer');
      const assignedContainer = document.getElementById('assignedItemsContainer');

      Object.values(lists).forEach(l => { if (l) l.innerHTML = ''; });
      if (historyContainer) historyContainer.innerHTML = '';
      if (assignedContainer) assignedContainer.innerHTML = '';

      let counts = { pendiente: 0, proceso: 0, finalizado: 0 };
      let filteredTasks = tasks;

      const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
      const priorityFilter = document.getElementById('filterPrio')?.value || '';

      filteredTasks = tasks.filter(task => {
        const matchSearch = task.title.toLowerCase().includes(searchTerm) || 
                            task.desc.toLowerCase().includes(searchTerm) ||
                            task.tag.toLowerCase().includes(searchTerm);
        const matchPriority = !priorityFilter || task.prio === priorityFilter;
        return matchSearch && matchPriority;
      });

      filteredTasks.forEach(task => {
        counts[task.status]++;
        const card = createCard(task);
        if (lists[task.status]) lists[task.status].appendChild(card);
      });

      tasks.forEach(task => {
        if (task.status === 'pendiente' && historyContainer) {
          const histClone = createCard(task);
          histClone.draggable = false;
          historyContainer.appendChild(histClone);
        }
        if (task.assignee === 'Santiago Cano' && assignedContainer) {
          const assignClone = createCard(task);
          assignClone.draggable = false;
          assignedContainer.appendChild(assignClone);
        }
      });

      document.getElementById('totalTasks').innerText = tasks.length;
      ['pendiente', 'proceso', 'finalizado'].forEach(s => {
        const countEl = document.getElementById(`count-${s}`);
        if (countEl) countEl.innerText = counts[s];
        const statEl = document.getElementById(`stat${s.charAt(0).toUpperCase() + s.slice(1)}`);
        if (statEl) statEl.innerText = counts[s];
      });

      Object.entries(lists).forEach(([status, zone]) => {
        if (zone && zone.children.length === 0) {
          zone.innerHTML = `<div class="empty-state"><i class="bi bi-inbox"></i><p>Sin tareas en ${status}</p></div>`;
        }
      });

      setupDropZones();
    }

    // ============= EVENTOS MODAL ============= 
    document.getElementById('btnGenerateReport')?.addEventListener('click', () => {
      document.getElementById('taskId').value = '';
      document.getElementById('taskTitle').value = '';
      document.getElementById('taskDesc').value = '';
      document.getElementById('taskStatus').value = 'pendiente';
      document.getElementById('taskPrio').value = 'media';
      document.getElementById('taskTag').value = '';
      document.getElementById('taskAssignee').value = 'Santiago Cano';
      document.getElementById('modalTitle').innerText = 'Nuevo Reporte';
      document.getElementById('btnDelete').classList.add('d-none');
      taskModal.show();
    });

    function openEditModal(id) {
      const task = tasks.find(t => t.id === id);
      if (!task) return;
      document.getElementById('taskId').value = task.id;
      document.getElementById('taskTitle').value = task.title;
      document.getElementById('taskDesc').value = task.desc;
      document.getElementById('taskStatus').value = task.status;
      document.getElementById('taskPrio').value = task.prio;
      document.getElementById('taskTag').value = task.tag;
      document.getElementById('taskAssignee').value = task.assignee || 'Santiago Cano';
      document.getElementById('modalTitle').innerText = `Editar Reporte #${task.id}`;
      document.getElementById('btnDelete').classList.remove('d-none');
      taskModal.show();
    }

    document.getElementById('btnSaveTask')?.addEventListener('click', () => {
      const id = document.getElementById('taskId').value;
      const title = document.getElementById('taskTitle').value.trim();
      const desc = document.getElementById('taskDesc').value.trim();
      const status = document.getElementById('taskStatus').value;
      const prio = document.getElementById('taskPrio').value;
      const tag = document.getElementById('taskTag').value.trim() || 'General';
      const assignee = document.getElementById('taskAssignee').value;

      if (!title || !desc) {
        alert('Por favor completa título y descripción');
        return;
      }

      if (id) {
        const task = tasks.find(t => t.id == id);
        if (task) {
          task.title = title; task.desc = desc; task.status = status;
          task.prio = prio; task.tag = tag; task.assignee = assignee;
        }
      } else {
        tasks.unshift({
          id: Math.floor(100 + Math.random() * 900),
          title, desc, status, prio, tag, assignee,
          date: 'Hoy, ' + new Date().toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' })
        });
      }
      taskModal.hide();
      renderAll();
    });

    document.getElementById('btnDelete')?.addEventListener('click', () => {
      const id = document.getElementById('taskId').value;
      if (id && confirm('¿Eliminar esta tarea?')) {
        tasks = tasks.filter(t => t.id != id);
        taskModal.hide();
        renderAll();
      }
    });

    document.getElementById('searchInput')?.addEventListener('input', renderAll);
    document.getElementById('filterPrio')?.addEventListener('change', renderAll);

    function escapeHtml(text) {
      const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    document.addEventListener('DOMContentLoaded', renderAll);
  </script>
</body>
