<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HebraTech — Módulo Operarios</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/operario.css">
</head>
<body>

<nav class="navbar px-4 py-2">
  <div class="container-fluid px-0">
    <a class="navbar-brand d-flex align-items-center gap-2 text-decoration-none" href="#">
      <div style="width:34px;height:34px;background:var(--fortaleza);border-radius:8px;display:flex;align-items:center;justify-content:center;">
        <i class="bi bi-grid-3x3-gap-fill" style="color:var(--atencion);font-size:16px;"></i>
      </div>
      <span class="brand-text">HebraTech</span>
    </a>
    <div class="d-flex align-items-center gap-2">
      <span class="stat-pill d-none d-sm-flex">
        <span class="stat-dot" style="background:var(--amber)"></span>
        <span id="statPendiente">0</span> pendiente
      </span>
      <span class="stat-pill d-none d-sm-flex">
        <span class="stat-dot" style="background:var(--atencion)"></span>
        <span id="statProceso">0</span> en proceso
      </span>
      <span class="stat-pill d-none d-sm-flex">
        <span class="stat-dot" style="background:var(--success)"></span>
        <span id="statFinalizado">0</span> finalizadas
      </span>
      <button class="btn btn-primary btn-sm ms-1" onclick="openNewTask()">
        <i class="bi bi-plus-lg me-1"></i>Nueva Tarea
      </button>
    </div>
  </div>
</nav>

<div class="container-fluid p-3 p-md-4">

  <div class="d-flex justify-content-between align-items-start mb-3 flex-wrap gap-2">
    <div>
      <h2 class="mb-0" style="font-family:'Space Grotesk';font-weight:700;font-size:1.4rem;">Tablero Operarios</h2>
      <small style="color:rgba(231,246,242,0.45);">Total de tareas: <strong id="totalTasks">0</strong></small>
    </div>
    <div class="d-flex gap-2 flex-wrap">
      <div class="search-wrap">
        <i class="bi bi-search" style="color:rgba(165,201,202,0.5);font-size:13px;"></i>
        <input type="text" id="searchInput" placeholder="Buscar tarea..." style="min-width:140px;" oninput="renderTasks()" autocomplete="off">
      </div>
      <div class="search-wrap">
        <i class="bi bi-person" style="color:rgba(165,201,202,0.5);font-size:13px;"></i>
        <select id="filterAssignee" onchange="renderTasks()">
          <option value="">Todos los operarios</option>
          <option value="Santiago Cano">Santiago Cano</option>
          <option value="Jorge Almanza">Jorge Almanza</option>
          <option value="Deivid Sierra">Deivid Sierra</option>
          <option value="Juan Alba">Juan Alba</option>
          <option value="Yeferson Idarraga">Yeferson Idarraga</option>
        </select>
      </div>
      <div class="search-wrap">
        <i class="bi bi-funnel" style="color:rgba(165,201,202,0.5);font-size:13px;"></i>
        <select id="filterPrio" onchange="renderTasks()">
          <option value="">Toda prioridad</option>
          <option value="alta">Alta</option>
          <option value="media">Media</option>
          <option value="baja">Baja</option>
        </select>
      </div>
    </div>
  </div>

  <div class="kanban-board">
    <div class="kanban-col" id="col-pendiente" data-status="pendiente" ondragover="onDragOver(event)" ondrop="onDrop(event,'pendiente')" ondragleave="onDragLeave(event)">
      <div class="col-header">
        <span class="col-dot" style="background:var(--amber)"></span>
        <span class="col-title">Pendiente</span>
        <span class="col-count" id="count-pendiente" style="background:rgba(244,180,0,0.15);color:var(--amber)">0</span>
      </div>
      <div class="task-list" id="list-pendiente"></div>
    </div>

    <div class="kanban-col" id="col-proceso" data-status="proceso" ondragover="onDragOver(event)" ondrop="onDrop(event,'proceso')" ondragleave="onDragLeave(event)">
      <div class="col-header">
        <span class="col-dot" style="background:var(--atencion)"></span>
        <span class="col-title">En Proceso</span>
        <span class="col-count" id="count-proceso" style="background:rgba(165,201,202,0.12);color:var(--atencion)">0</span>
      </div>
      <div class="task-list" id="list-proceso"></div>
    </div>

    <div class="kanban-col" id="col-finalizado" data-status="finalizado" ondragover="onDragOver(event)" ondrop="onDrop(event,'finalizado')" ondragleave="onDragLeave(event)">
      <div class="col-header">
        <span class="col-dot" style="background:var(--success)"></span>
        <span class="col-title">Finalizado</span>
        <span class="col-count" id="count-finalizado" style="background:rgba(76,175,125,0.15);color:var(--success)">0</span>
      </div>
      <div class="task-list" id="list-finalizado"></div>
    </div>
  </div>
</div>

<div class="modal fade" id="taskModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle"><i class="bi bi-plus-circle me-2" style="color:var(--atencion)"></i>Nueva Tarea</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="taskId">
        <div class="mb-3">
          <label class="form-label">Título *</label>
          <input type="text" class="form-control" id="taskTitle" placeholder="Ej: Revisar inventario">
        </div>
        <div class="mb-3">
          <label class="form-label">Descripción</label>
          <textarea class="form-control" id="taskDesc" rows="3" placeholder="Detalles..."></textarea>
        </div>
        <div class="row g-3 mb-3">
          <div class="col-6">
            <label class="form-label">Responsable</label>
            <select class="form-select" id="taskAssignee">
              <option value="Santiago Cano">Santiago Cano</option>
              <option value="Jorge Almanza">Jorge Almanza</option>
              <option value="Deivid Sierra">Deivid Sierra</option>
              <option value="Juan Alba">Juan Alba</option>
              <option value="Yeferson Idarraga">Yeferson Idarraga</option>
            </select>
          </div>
          <div class="col-6">
            <label class="form-label">Prioridad</label>
            <select class="form-select" id="taskPrio">
              <option value="baja">🟢 Baja</option>
              <option value="media" selected>🟡 Media</option>
              <option value="alta">🔴 Alta</option>
            </select>
          </div>
        </div>
        <div class="row g-3">
          <div class="col-6">
            <label class="form-label">Estado</label>
            <select class="form-select" id="taskStatus">
              <option value="pendiente">Pendiente</option>
              <option value="proceso">En Proceso</option>
              <option value="finalizado">Finalizado</option>
            </select>
          </div>
          <div class="col-6">
            <label class="form-label">Etiqueta</label>
            <input type="text" class="form-control" id="taskTag" placeholder="Ej: Mantenimiento">
          </div>
        </div>
      </div>
      <div class="modal-footer gap-2">
        <button type="button" class="btn btn-outline-danger d-none" id="btnDelete" onclick="confirmDelete()">Eliminar</button>
        <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-primary" onclick="saveTask()">Guardar</button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="viewModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-eye me-2" style="color:var(--atencion)"></i>Detalle</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="viewBody"></div>
      <div class="modal-footer gap-2">
        <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Cerrar</button>
        <button type="button" class="btn btn-primary" id="btnViewEdit">Editar</button>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const STORAGE_KEY = 'hebratech-tasks-v2';
let tasks = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
let draggedId = null;
let taskModal, viewModal;

if (tasks.length === 0) {
  tasks = [
    { id: 1, title: 'Revisar inventario de materiales', desc: 'Verificar stock de tornillos.', assignee: 'Santiago Cano', prio: 'alta', status: 'pendiente', tag: 'Inventario', createdAt: Date.now() },
    { id: 2, title: 'Mantenimiento máquina A3', desc: 'Lubricación mensual.', assignee: 'Jorge Almanza', prio: 'alta', status: 'proceso', tag: 'Mantenimiento', createdAt: Date.now() }
  ];
  save();
}

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); }
function nextId() { return tasks.length ? Math.max(...tasks.map(t=>t.id)) + 1 : 1; }
function getInitials(name) { return name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2); }
function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
function esc(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderTasks() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const fAssignee = document.getElementById('filterAssignee').value;
  const fPrio = document.getElementById('filterPrio').value;

  document.getElementById('totalTasks').textContent = tasks.length;

  const filtered = tasks.filter(t => {
    const mSearch = t.title.toLowerCase().includes(search);
    const mAssignee = !fAssignee || t.assignee === fAssignee;
    const mPrio = !fPrio || t.prio === fPrio;
    return mSearch && mAssignee && mPrio;
  });

  ['pendiente','proceso','finalizado'].forEach(status => {
    const list = document.getElementById(`list-${status}`);
    const inCol = filtered.filter(t => t.status === status);
    document.getElementById(`count-${status}`).textContent = inCol.length;
    document.getElementById(`stat${cap(status)}`).textContent = inCol.length;
    
    if (inCol.length === 0) {
      list.innerHTML = `<div class="empty-state">Sin tareas</div>`;
    } else {
      list.innerHTML = inCol.map(t => cardHTML(t)).join('');
    }
  });
}

function cardHTML(t) {
  return `
  <div class="task-card p-${t.prio}" draggable="true" ondragstart="onDragStart(event, ${t.id})">
    <div class="task-title">${esc(t.title)}</div>
    <div class="task-footer">
      <div class="assignee-chip"><div class="avatar">${getInitials(t.assignee)}</div><span class="assignee-name">${t.assignee}</span></div>
    </div>
    <div class="d-flex justify-content-end gap-1 mt-2">
        <button class="task-btn" onclick="viewTask(${t.id})"><i class="bi bi-eye"></i></button>
        <button class="task-btn" onclick="editTask(${t.id})"><i class="bi bi-pencil"></i></button>
    </div>
  </div>`;
}

function openNewTask() {
  document.getElementById('taskId').value = '';
  document.getElementById('taskTitle').value = '';
  document.getElementById('taskDesc').value = '';
  taskModal.show();
}

function saveTask() {
  const title = document.getElementById('taskTitle').value.trim();
  if (!title) return;
  const id = document.getElementById('taskId').value;
  const data = {
    title,
    desc: document.getElementById('taskDesc').value,
    assignee: document.getElementById('taskAssignee').value,
    prio: document.getElementById('taskPrio').value,
    status: document.getElementById('taskStatus').value,
    tag: document.getElementById('taskTag').value
  };
  if (id) {
    const idx = tasks.findIndex(x=>x.id===+id);
    tasks[idx] = { ...tasks[idx], ...data };
  } else {
    tasks.push({ id: nextId(), ...data, createdAt: Date.now() });
  }
  save(); renderTasks(); taskModal.hide();
}

function onDragStart(e, id) { draggedId = id; }
function onDragOver(e) { e.preventDefault(); }
function onDrop(e, status) {
  const t = tasks.find(x=>x.id===draggedId);
  if (t) { t.status = status; save(); renderTasks(); }
}

document.addEventListener('DOMContentLoaded', () => {
  taskModal = new bootstrap.Modal(document.getElementById('taskModal'));
  viewModal = new bootstrap.Modal(document.getElementById('viewModal'));
  renderTasks();
});
</script>
</body>
</html>
