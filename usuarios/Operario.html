<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HebraTech — Módulo Operarios</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/operario.css">
</head>

<body style="background:#1E2224;">
  <nav class="navbar navbar-expand border-bottom border-secondary-subtle px-4 py-2" style="background:#2C4A52;">
    <div class="container-fluid px-0">
      <a class="navbar-brand d-flex align-items-center gap-2 text-decoration-none" href="#">
        <div class="d-flex align-items-center justify-content-center rounded"
          style="width:34px;height:34px;background:linear-gradient(135deg,#395B64,#2C3333);box-shadow:0 4px 12px rgba(57,91,100,0.35);">
          <img src="../img/logo.png" alt="HebraTech" style="width:22px;height:22px;object-fit:contain;filter:brightness(0) invert(1) sepia(1) saturate(2) hue-rotate(155deg);" />
        </div>
        <span class="fw-bold" style="font-family:'Space Grotesk',sans-serif;color:#A5C9CA;">HebraTech</span>
      </a>

      <div class="d-flex align-items-center gap-2">
        <span
          class="badge rounded-pill border border-secondary-subtle text-body-secondary d-none d-lg-inline-block p-2 px-3"
          style="background: #223135;">
          <span class="badge bg-secondary rounded-circle p-1 me-1"> </span> <span id="statPendiente"
            class="text-light">0</span> <span style="color: #A5C9CA;">pendiente</span>
        </span>
        <span
          class="badge rounded-pill border border-secondary-subtle text-body-secondary d-none d-lg-inline-block p-2 px-3"
          style="background: #223135;">
          <span class="badge bg-info-subtle rounded-circle p-1 me-1"> </span> <span id="statProceso"
            class="text-light">0</span> <span style="color: #A5C9CA;">en proceso</span>
        </span>
        <span
          class="badge rounded-pill border border-secondary-subtle text-body-secondary d-none d-lg-inline-block p-2 px-3"
          style="background: #223135;">
          <span class="badge bg-success-subtle rounded-circle p-1 me-1"> </span> <span id="statFinalizado"
            class="text-light">0</span> <span style="color: #A5C9CA;">finalizadas</span>
        </span>

        <!-- Botón e Historial de Tareas Asignadas -->
        <div class="dropdown">
          <button class="btn btn-outline-secondary btn-sm d-flex align-items-center gap-2 border-secondary-subtle"
            type="button" data-bs-toggle="dropdown" data-bs-auto-close="outside">
            <i class="bi bi-clipboard-check text-white"></i>
            <span class="text-light">Asignadas</span>
          </button>
          <div class="dropdown-menu dropdown-menu-end p-3 shadow-lg"
            style="width: 380px; max-height: 480px; overflow-y: auto; background: #223135; border-color: #395B64;">
            <div class="d-flex align-items-center gap-2 border-bottom border-secondary-subtle pb-2 mb-3">
              <i class="bi bi-person-workspace text-white"></i>
              <span class="fw-bold text-light" style="font-family: 'Space Grotesk';">Mis Tareas Asignadas</span>
            </div>
            <div id="assignedItemsContainer"></div>
          </div>
        </div>

        <!-- Botón e Historial de Reportes (Solo Pendientes) -->
        <div class="dropdown">
          <button class="btn btn-outline-secondary btn-sm d-flex align-items-center gap-2 border-secondary-subtle"
            type="button" data-bs-toggle="dropdown" data-bs-auto-close="outside">
            <i class="bi bi-clock-history text-white"></i>
            <span class="text-light">Historial</span>
          </button>
          <div class="dropdown-menu dropdown-menu-end p-3 shadow-lg"
            style="width: 380px; max-height: 480px; overflow-y: auto; background: #223135; border-color: #395B64;">
            <div class="d-flex align-items-center gap-2 border-bottom border-secondary-subtle pb-2 mb-3">
              <i class="bi bi-journal-text text-white"></i>
              <span class="fw-bold text-light" style="font-family: 'Space Grotesk';">Mis Reportes Pendientes</span>
            </div>
            <div id="historyItemsContainer"></div>
          </div>
        </div>

        <button class="btn btn-sm px-3 text-white" style="background:#395B64;border-color:#395B64;"
          id="btnGenerateReport">
          <i class="bi bi-plus-lg me-1"></i>Generar reporte
        </button>

        <!-- Perfil de usuario -->
        <div class="dropdown">
          <button
            class="btn btn-outline-secondary btn-sm rounded-pill px-3 d-flex align-items-center gap-2 border-secondary-subtle"
            type="button" data-bs-toggle="dropdown" aria-expanded="false">
            <i class="bi bi-person-circle fs-6 text-light"></i>
            <span class="text-light d-none d-md-inline">Santiago Cano</span>
          </button>
          <ul class="dropdown-menu dropdown-menu-end p-2 shadow-lg mt-2"
            style="background: #223135; border-color: #395B64;">
            <li class="px-3 py-2 text-center text-light">
              <small class="text-body-secondary d-block">Usuario actual</small>
              <strong>Santiago Cano</strong>
            </li>
            <li>
              <hr class="dropdown-divider" style="border-color: #395B64;">
            </li>
            <li>
              <a class="dropdown-item text-danger fw-semibold" href="../inicio.html">
                <i class="bi bi-box-arrow-right me-2"></i>Cerrar sesión
              </a>
            </li>
          </ul>
        </div>
      </div>
    </div>
  </nav>

  <div class="container-fluid p-4">
    <div class="d-flex justify-content-between align-items-start mb-4 flex-wrap gap-3">
      <div>
        <h2 class="mb-0 fw-bold text-light" style="font-family:'Space Grotesk';">Tablero Operarios</h2>
        <small class="text-body-secondary">Total de tareas: <strong id="totalTasks"
            class="text-light">0</strong></small>
      </div>
      <div class="d-flex gap-2">
        <div class="input-group input-group-sm" style="max-width: 220px;">
          <span class="input-group-text border-secondary-subtle text-body-secondary" style="background: #223135;"><i
              class="bi bi-search"></i></span>
          <input type="text" id="searchInput" class="form-control border-secondary-subtle text-light"
            style="background: #223135;" placeholder="Buscar tarea...">
        </div>
        <div class="input-group input-group-sm" style="max-width: 160px;">
          <span class="input-group-text border-secondary-subtle text-body-secondary" style="background: #223135;"><i
              class="bi bi-funnel"></i></span>
          <select id="filterPrio" class="form-select border-secondary-subtle text-light" style="background: #223135;">
            <option value="">Toda prioridad</option>
            <option value="alta">Alta</option>
            <option value="media" selected>Media</option>
            <option value="baja">Baja</option>
          </select>
        </div>
      </div>
    </div>

    <div class="row g-4">
      <!-- Pendiente -->
      <div class="col-12 col-lg-4">
        <div class="border border-secondary-subtle rounded-4 p-3 d-flex flex-column"
          style="min-height: 65vh; background: #222D30;">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="d-flex align-items-center gap-2 fw-bold text-light" style="font-family: 'Space Grotesk';">
              <span class="badge rounded-circle p-1" style="background: #395B64;"> </span> Pendiente
            </div>
            <span class="badge text-light rounded-pill" id="count-pendiente" style="background: #395B64;">0</span>
          </div>
          <div class="d-flex flex-column gap-2 drop-zone" id="list-pendiente" data-status="pendiente"></div>
        </div>
      </div>

      <!-- En Proceso -->
      <div class="col-12 col-lg-4">
        <div class="border border-secondary-subtle rounded-4 p-3 d-flex flex-column"
          style="min-height: 65vh; background: #222D30;">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="d-flex align-items-center gap-2 fw-bold text-light" style="font-family: 'Space Grotesk';">
              <span class="badge rounded-circle p-1" style="background: #A5C9CA;"> </span> En Proceso
            </div>
            <span class="badge text-light rounded-pill" id="count-proceso" style="background: #395B64;">0</span>
          </div>
          <div class="d-flex flex-column gap-2 drop-zone" id="list-proceso" data-status="proceso"></div>
        </div>
      </div>

      <!-- Finalizado -->
      <div class="col-12 col-lg-4">
        <div class="border border-secondary-subtle rounded-4 p-3 d-flex flex-column"
          style="min-height: 65vh; background: #222D30;">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="d-flex align-items-center gap-2 fw-bold text-light" style="font-family: 'Space Grotesk';">
              <span class="badge rounded-circle p-1" style="background: #2C4A52;"> </span> Finalizado
            </div>
            <span class="badge text-light rounded-pill" id="count-finalizado" style="background: #395B64;">0</span>
          </div>
          <div class="d-flex flex-column gap-2 drop-zone" id="list-finalizado" data-status="finalizado"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal fade" id="taskModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border border-secondary-subtle" style="background: #223135;">
        <div class="modal-header border-bottom border-secondary-subtle">
          <h5 class="modal-title text-light" id="modalTitle">Reporte</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="taskId">
          <div class="mb-3">
            <label class="form-label small text-body-secondary">Título</label>
            <input type="text" class="form-control border-secondary-subtle text-light" style="background: #1E2224;"
              id="taskTitle">
          </div>
          <div class="mb-3">
            <label class="form-label small text-body-secondary">Descripción</label>
            <textarea class="form-control border-secondary-subtle text-light" style="background: #1E2224;" id="taskDesc"
              rows="3"></textarea>
          </div>
          <div class="row g-3 mb-3">
            <div class="col-6">
              <label class="form-label small text-body-secondary">Responsable</label>
              <input type="text" class="form-control border-secondary-subtle text-light" style="background: #1E2224;"
                id="taskAssignee" readonly value="Santiago Cano">
            </div>
            <div class="col-6">
              <label class="form-label small text-body-secondary">Prioridad</label>
              <select class="form-select border-secondary-subtle text-light" style="background: #1E2224;" id="taskPrio">
                <option value="baja">🟢 Baja</option>
                <option value="media" selected>⚪ Media</option>
                <option value="alta">🔴 Alta</option>
              </select>
            </div>
          </div>
          <div class="row g-3">
            <div class="col-6">
              <label class="form-label small text-body-secondary">Etiqueta</label>
              <input type="text" class="form-control border-secondary-subtle text-light" style="background: #1E2224;"
                id="taskTag">
            </div>
            <div class="col-6">
              <label class="form-label small text-body-secondary">Estado</label>
              <select class="form-select border-secondary-subtle text-light" style="background: #1E2224;"
                id="taskStatus">
                <option value="pendiente">Pendiente</option>
                <option value="proceso">En Proceso</option>
                <option value="finalizado">Finalizado</option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-footer border-top border-secondary-subtle gap-2">
          <button type="button" class="btn btn-outline-danger d-none" id="btnDelete">Eliminar</button>
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn text-white" style="background: #395B64;" id="btnSaveTask">Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    let tasks = [
      { id: 831, title: "Mantenimiento Telar A", desc: "Se realizó ajuste de tensión y lubricación de engranajes.", status: "finalizado", prio: "media", tag: "Mantenimiento", date: "Hoy, 09:15 AM", assignee: "Santiago Cano" },
      { id: 794, title: "Falla Eléctrica Sensor", desc: "Sensor óptico intermitente detiene la marcha.", status: "proceso", prio: "alta", tag: "Eléctrico", date: "Ayer, 03:40 PM", assignee: "Santiago Cano" },
      { id: 720, title: "Repuesto Agotado", desc: "Sin stock de materia prima en bodega central.", status: "pendiente", prio: "baja", tag: "Materia Prima", date: "28 May, 10:22 AM", assignee: "Otro Operario" }
    ];

    const taskModal = new bootstrap.Modal(document.getElementById('taskModal'));
    let draggedId = null;

    const statusStyles = {
      pendiente: { border: '#395B64', badge: 'background: rgba(57,91,100,0.2); color:#E2E8F0; border:1px solid #395B64;', label: 'Pendiente' },
      proceso: { border: '#A5C9CA', badge: 'background: rgba(165,201,202,0.15); color:#A5C9CA; border:1px solid #A5C9CA;', label: 'En Proceso' },
      finalizado: { border: '#2C4A52', badge: 'background: rgba(44,74,82,0.4); color:#CBD5E1; border:1px solid #2C4A52;', label: 'Finalizado' }
    };

    function createCard(task) {
      const s = statusStyles[task.status];
      const card = document.createElement('div');
      card.className = 'card border-0 border-start border-4 p-3 shadow-sm task-card';
      card.style.cssText = `background:#2C3E42; border-left-color:${s.border} !important; cursor:grab;`;
      card.setAttribute('draggable', 'true');
      card.dataset.id = task.id;
      card.innerHTML = `
        <div class="d-flex justify-content-between align-items-start mb-2">
          <span class="fw-semibold text-light" style="font-size:0.9rem;">${task.title}</span>
          <span class="badge" style="font-size:0.7rem;padding:4px 8px;${s.badge}">${s.label}</span>
        </div>
        <p class="mb-2 text-truncate" style="font-size:0.8rem;line-height:1.4;color:#CBD5E1;">${task.desc}</p>
        <div class="d-flex justify-content-between align-items-center" style="font-size:0.7rem;color:#A5C9CA;">
          <span><i class="bi bi-calendar3 me-1"></i>${task.date}</span>
          <span class="fw-bold">#${task.id}</span>
        </div>
      `;

      // Drag events
      card.addEventListener('dragstart', (e) => {
        draggedId = task.id;
        card.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });
      card.addEventListener('dragend', () => {
        card.classList.remove('dragging');
        document.querySelectorAll('.drop-placeholder').forEach(p => p.remove());
      });

      // Click para editar
      card.addEventListener('click', () => openEditModal(task.id));

      return card;
    }

    function setupDropZones() {
      document.querySelectorAll('.drop-zone').forEach(zone => {
        zone.addEventListener('dragover', (e) => {
          e.preventDefault();
          zone.classList.add('drag-over');
          e.dataTransfer.dropEffect = 'move';

          // Placeholder visual
          document.querySelectorAll('.drop-placeholder').forEach(p => p.remove());
          const placeholder = document.createElement('div');
          placeholder.className = 'drop-placeholder';
          zone.appendChild(placeholder);
        });

        zone.addEventListener('dragleave', (e) => {
          if (!zone.contains(e.relatedTarget)) {
            zone.classList.remove('drag-over');
            document.querySelectorAll('.drop-placeholder').forEach(p => p.remove());
          }
        });

        zone.addEventListener('drop', (e) => {
          e.preventDefault();
          zone.classList.remove('drag-over');
          document.querySelectorAll('.drop-placeholder').forEach(p => p.remove());

          const newStatus = zone.dataset.status;
          const task = tasks.find(t => t.id == draggedId);
          if (task && task.status !== newStatus) {
            task.status = newStatus;
            renderAll();
          }
          draggedId = null;
        });
      });
    }

    function renderAll() {
      const historyContainer = document.getElementById('historyItemsContainer');
      const assignedContainer = document.getElementById('assignedItemsContainer');

      const lists = {
        pendiente: document.getElementById('list-pendiente'),
        proceso: document.getElementById('list-proceso'),
        finalizado: document.getElementById('list-finalizado')
      };

      if (historyContainer) historyContainer.innerHTML = '';
      if (assignedContainer) assignedContainer.innerHTML = '';
      Object.values(lists).forEach(l => { if (l) l.innerHTML = ''; });

      let counts = { pendiente: 0, proceso: 0, finalizado: 0 };

      tasks.forEach(task => {
        counts[task.status]++;
        const card = createCard(task);

        // NUEVO CAMBIO: El historial ahora solo guarda los clones con estado "pendiente"
        if (task.status === 'pendiente') {
          const histClone = card.cloneNode(true);
          histClone.removeAttribute('draggable');
          histClone.addEventListener('click', () => openEditModal(task.id));
          if (historyContainer) historyContainer.appendChild(histClone);
        }

        // Clon para Historial de Asignadas (Filtro por usuario actual)
        if (task.assignee === 'Santiago Cano') {
          const assignClone = card.cloneNode(true);
          assignClone.removeAttribute('draggable');
          assignClone.addEventListener('click', () => openEditModal(task.id));
          if (assignedContainer) assignedContainer.appendChild(assignClone);
        }

        if (lists[task.status]) lists[task.status].appendChild(card);
      });

      document.getElementById('totalTasks').innerText = tasks.length;
      ['pendiente', 'proceso', 'finalizado'].forEach(s => {
        document.getElementById(`count-${s}`).innerText = counts[s];
        const statEl = document.getElementById(`stat${s.charAt(0).toUpperCase() + s.slice(1)}`);
        if (statEl) statEl.innerText = counts[s];
      });

      setupDropZones();
    }

    // ── Modal nuevo reporte ──
    document.getElementById('btnGenerateReport').onclick = () => {
      document.getElementById('taskId').value = '';
      document.getElementById('taskTitle').value = '';
      document.getElementById('taskDesc').value = '';
      document.getElementById('taskStatus').value = 'pendiente';
      document.getElementById('taskPrio').value = 'media';
      document.getElementById('taskTag').value = '';
      document.getElementById('taskAssignee').value = 'Santiago Cano';
      document.getElementById('modalTitle').innerText = 'Nuevo Reporte';
      document.getElementById('btnDelete').classList.add('d-none');
      taskModal.show();
    };

    function openEditModal(id) {
      const task = tasks.find(t => t.id === id);
      if (!task) return;
      document.getElementById('taskId').value = task.id;
      document.getElementById('taskTitle').value = task.title;
      document.getElementById('taskDesc').value = task.desc;
      document.getElementById('taskStatus').value = task.status;
      document.getElementById('taskPrio').value = task.prio;
      document.getElementById('taskTag').value = task.tag;
      document.getElementById('taskAssignee').value = task.assignee || 'Santiago Cano';
      document.getElementById('modalTitle').innerText = `Editar Reporte #${task.id}`;
      document.getElementById('btnDelete').classList.remove('d-none');
      taskModal.show();
    }

    document.getElementById('btnSaveTask').onclick = () => {
      const id = document.getElementById('taskId').value;
      const title = document.getElementById('taskTitle').value.trim();
      const desc = document.getElementById('taskDesc').value.trim();
      const status = document.getElementById('taskStatus').value;
      const prio = document.getElementById('taskPrio').value;
      const tag = document.getElementById('taskTag').value.trim() || 'General';
      const assignee = document.getElementById('taskAssignee').value;
      if (!title || !desc) return;

      if (id) {
        const task = tasks.find(t => t.id == id);
        if (task) { task.title = title; task.desc = desc; task.status = status; task.prio = prio; task.tag = tag; task.assignee = assignee; }
      } else {
        tasks.unshift({
          id: Math.floor(100 + Math.random() * 900),
          title, desc, status, prio, tag, assignee,
          date: 'Hoy, ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        });
      }
      taskModal.hide();
      renderAll();
    };

    document.getElementById('btnDelete').onclick = () => {
      const id = document.getElementById('taskId').value;
      if (id) { tasks = tasks.filter(t => t.id != id); taskModal.hide(); renderAll(); }
    };

    document.addEventListener('DOMContentLoaded', renderAll);
  </script>
</body>

</html>
